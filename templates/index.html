<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Gestão</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      color: #333;
    }

    /* Barra superior */
    header {
      background-color: #1f2937;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    nav a {
      color: #e5e7eb;
      text-decoration: none;
      margin-left: 25px;
      font-size: 14px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #60a5fa;
    }

    /* Conteúdo principal */
    .main {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 70px);
      padding: 20px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .card h1 {
      font-size: 28px;
      margin-bottom: 15px;
      color: #111827;
    }

    .card p {
      color: #6b7280;
      font-size: 16px;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 22px;
      background-color: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: 0.3s ease;
    }

    .btn:hover {
      background-color: #1e40af;
      transform: translateY(-2px);
      box-shadow: 0 5px 12px rgba(37, 99, 235, 0.3);
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

  <header>
    <h2>Sistema de Gestão</h2>
    <nav>
      <a href="/">Início</a>
      <a href="/sobre">Sobre</a>
      <a href="/cor/red">Página Vermelha</a>
      <a href="/bootstrap">Bootstrap</a>
    </nav>
  </header>

  <div class="main">
    <div class="card">
      <h1>Bem-vindo</h1>
      <p>
        Este sistema foi desenvolvido com Flask para oferecer uma estrutura
        moderna, organizada e preparada para expansão.
      </p>
      <a href="/sobre" class="btn">Saiba mais</a>
    </div>
  </div>

  <footer>
    © 2026 Sistema de Gestão — Todos os direitos reservados
  </footer>

</body>
</html>
